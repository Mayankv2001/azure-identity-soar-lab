# Detection-as-Code (shift-left) — validate on PR, deploy analytics rules on main.
#
# Security infrastructure is treated as code: KQL + YAML detections and Bicep are
# linted and tested on every pull request, and deployed to Microsoft Sentinel
# through an approval-gated environment on merge to main.
#
# AUTH: OIDC / workload identity federation only. NO client secrets are stored in
# GitHub. (This is the secure counterpart to what DET-CICD-001 detects when a
# pipeline is compromised - least-privilege federated identity, scoped to one
# environment, and an approval gate before any deploy.)
name: deploy-detections

on:
  pull_request:
    paths:
      - "detections/**"
      - "v2-agentic-soar/detections/**"
      - "infra/**"
      - "v2-agentic-soar/infra/**"
      - "src/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "detections/**"
      - "v2-agentic-soar/**"
      - "infra/**"

permissions:
  id-token: write      # required for OIDC federated login to Azure
  contents: read

jobs:
  validate:
    name: Validate detections (shift-left)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements.txt
      - name: Validate detection-as-code contract
        run: python3 scripts/validate_rules.py
      - name: Validate control-plane module rules
        run: python3 modules/datacenter-control-plane/src/validate_module.py
      - name: Lint Bicep (build only, no deploy)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep build --file infra/sentinel/main.bicep
            az bicep build --file v2-agentic-soar/infra/deploy-v2.bicep

  test:
    name: Test detection + correlation logic
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run full test suite
        run: python3 -m pytest -q
      - name: Smoke-run the graph correlation engine
        run: python3 src/graph_correlation.py --demo

  deploy:
    name: Deploy analytics rules to Sentinel (approval-gated)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: sentinel-production   # GitHub environment carrying a required-reviewers gate
    steps:
      - uses: actions/checkout@v4
      - name: Azure login via OIDC (no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy detection rules (Bicep)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "${{ vars.SENTINEL_RESOURCE_GROUP }}" \
              --template-file v2-agentic-soar/infra/deploy-v2.bicep \
              --parameters \
                  workspaceName="${{ vars.SENTINEL_WORKSPACE_NAME }}" \
                  enableRules=false
      - name: Post-deploy verification (Sentinel rules are not visible to az resource list)
        uses: azure/cli@v2
        with:
          inlineScript: |
            SUB="$(az account show --query id -o tsv)"
            az rest --method get \
              --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/${{ vars.SENTINEL_RESOURCE_GROUP }}/providers/Microsoft.OperationalInsights/workspaces/${{ vars.SENTINEL_WORKSPACE_NAME }}/providers/Microsoft.SecurityInsights/alertRules?api-version=2023-11-01" \
              --query "value[].{name:properties.displayName, enabled:properties.enabled}" -o table
