id: DET-004
name: New Credential Added to Service Principal
version: 1.0.0
kind: Scheduled
severity: High
status: Enabled
description: >-
  Fires whenever a credential (client secret or certificate) is added to a
  service principal. This is a favourite persistence technique because service
  principal credentials survive user password resets, sit outside MFA, and are
  rarely reviewed. Escalates to Critical when the target application is
  classified high-privilege in the asset inventory (for example, applications
  holding Directory.ReadWrite.All).
data_sources:
  - AuditLogs
tactics:
  - Persistence
  - PrivilegeEscalation
techniques:
  - T1098.001
query_file: ./DET-004-service-principal-credential.kql
query_frequency: PT15M
query_period: P1D
trigger_operator: GreaterThan
trigger_threshold: 0
entity_mappings:
  - entity_type: Account
    field: ActorUPN
  - entity_type: CloudApplication
    field: TargetSP
local_detection: detect_sp_credential_added
tuning:
  known_false_positives:
    - Scheduled secret rotation by approved DevOps pipelines (exclude the pipeline principal).
    - Application owners rotating credentials ahead of expiry.
  exclusions: []
sla:
  ack_minutes: 30
  resolve_hours: 8
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://learn.microsoft.com/en-us/entra/identity-platform/security-best-practices-for-app-registration
