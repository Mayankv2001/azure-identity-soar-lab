# Detection-as-code pipeline for the AI-Assisted Azure Identity Threat Detection & SOAR Lab.
#
# Every detection lives in the repo as a KQL query plus a YAML rule definition,
# reviewed like any other code. This pipeline is the quality gate:
#   Validate -> Test -> Package -> Deploy (approval-gated)
#
# The Deploy stage targets the 'sentinel-production' environment, which carries a
# manual-approval check in Azure DevOps - a human signs off before any analytics
# rule reaches the production workspace. Without a subscription configured the
# deploy steps document the exact commands and exit green, so the pipeline also
# runs in fork/demo mode.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - detections/*
      - src/*
      - tests/*
      - .azure-pipelines/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - detections/*
      - src/*
      - tests/*

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.12"

stages:
  - stage: Validate
    displayName: Validate detection-as-code contract
    jobs:
      - job: schema_checks
        displayName: Rule schema and catalogue consistency
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
          - script: python -m pip install --upgrade pip && pip install -r requirements.txt
            displayName: Install dependencies
          - script: |
              python -m pytest tests/test_detection_engine.py \
                -k "catalogue or yaml" -v
            displayName: Every rule has KQL + YAML + engine implementation

  - stage: Test
    displayName: Detection logic tests
    dependsOn: Validate
    jobs:
      - job: pytest
        displayName: Full test suite plus demo smoke run
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
          - script: python -m pip install --upgrade pip && pip install -r requirements.txt
            displayName: Install dependencies
          - script: python -m pytest -v
            displayName: Run all tests
          - script: python src/main.py --demo
            displayName: End-to-end demo smoke run
          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: output
              artifactName: sample-run-output
            displayName: Publish demo output as build artifact

  - stage: Package
    displayName: Package detections
    dependsOn: Test
    jobs:
      - job: package
        steps:
          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: detections
              artifactName: detections
            displayName: Publish detection rules artifact

  - stage: Deploy
    displayName: Deploy to Microsoft Sentinel (approval-gated)
    dependsOn: Package
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy_rules
        displayName: Deploy analytics rules
        environment: sentinel-production   # manual-approval check configured on this environment
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
                      echo "No subscription configured - demo mode."
                      echo "In a real tenant this stage runs, per rule file:"
                      echo "  az sentinel alert-rule create \\"
                      echo "    --resource-group rg-secops \\"
                      echo "    --workspace-name law-sentinel-prod \\"
                      echo "    --rule-id DET-001 \\"
                      echo "    --scheduled ... (fields mapped from detections/DET-001-mfa-fatigue.yaml)"
                      exit 0
                    fi
                    echo "Deploying analytics rules to workspace..."
                  displayName: Deploy rules (documented path, guarded)
