id: CP-DET-004
title: Credential added to high-privilege service principal
description: >-
  A credential (client secret or certificate) added to a service principal that
  the asset inventory classifies as high-privilege. Service principal
  credentials survive user password resets and MFA, making this durable
  persistence and a bridge into the Azure control plane.
severity: Critical
data_source: AuditLogs
tactics:
  - Persistence
techniques:
  - T1098.001
false_positive_guidance: >-
  Scheduled secret rotation by approved DevOps pipelines and owner-driven
  rotation ahead of expiry. Exclude the known rotation principal and require a
  change reference.
response_guidance: >-
  Remove the newly added credential immediately, review the service principal's
  sign-ins for use of it, rotate remaining credentials, and audit the app's role
  assignments. Chain stage 4.
owner: Cloud Security Engineering
version: 1.0.0
local_detection: detect_sp_credential_added
test_expectation: >-
  Fires only for the high-privilege sp-infra-deploy; the credential added to the
  low-privilege sp-monitoring-reader must not fire.
references:
  - https://attack.mitre.org/techniques/T1098/001/
