id: DET-CICD-001
name: Compromised CI/CD pipeline - workload-identity credential bridging
version: 2.0.0
kind: Scheduled
severity: High
status: Disabled
description: >-
  Detects a GitHub Actions workflow that authenticates to Microsoft Entra ID via
  an OIDC federated credential (workload identity federation) and, within a short
  bridge window, either extracts secrets from Azure Key Vault at abnormal volume
  or escalates privilege via a role assignment. Models a poisoned-pipeline /
  credential-bridging attack where a short-lived federated token is turned into
  Azure control-plane access. Escalates to Critical when the federated subject is
  not on the approved allow-list. Ships DISABLED - requires tenant-specific
  validation of diagnostic-setting column availability and the approved-federation
  watchlist before enabling.
data_sources:
  - AADServicePrincipalSignInLogs
  - AzureDiagnostics
  - AzureActivity
tactics:
  - CredentialAccess
  - PrivilegeEscalation
  - LateralMovement
techniques:
  - T1552.007
  - T1550.001
  - T1098.001
  - T1098.003
query_file: ./DET-CICD-001-workload-identity-credential-bridging.kql
query_frequency: PT15M
query_period: PT1H
trigger_operator: GreaterThan
trigger_threshold: 0
entity_mappings:
  - entity_type: CloudApplication
    field: ServicePrincipalName
  - entity_type: IP
    field: IPAddress
  - entity_type: AzureResource
    field: GrantedScope
local_detection: null
tuning:
  known_false_positives:
    - Approved deployment pipelines that legitimately read Key Vault secrets during a release.
    - Landing-zone automation performing role assignments as part of onboarding.
  exclusions:
    - field: Subject
      op: in_watchlist
      values:
        - ApprovedFederatedIdentities
sla:
  ack_minutes: 30
  resolve_hours: 8
references:
  - https://attack.mitre.org/techniques/T1552/007/
  - https://attack.mitre.org/techniques/T1550/001/
  - https://learn.microsoft.com/en-us/entra/workload-id/workload-identity-federation
  - https://learn.microsoft.com/en-us/azure/sentinel/detect-threats-custom
